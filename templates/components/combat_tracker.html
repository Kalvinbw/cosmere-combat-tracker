<!-- Combat Tracker (shown inside #tab-calc when combat is active) -->
<div class="combat-wrap" id="combatWrap">
  <div class="card">
    <div class="card-title">
      <div class="combat-header-row">
        <span class="combat-round-label">Combat — Round <span id="combatRound">1</span></span>
        <div class="combat-controls">
          <button class="combat-btn combat-btn-add"  onclick="openMidCombatModal()">+ Add Combatant</button>
          <button class="combat-btn combat-btn-next" onclick="nextRound()">Next Round</button>
          <button class="combat-btn combat-btn-end"  onclick="endCombat()">End Combat</button>
        </div>
      </div>
    </div>

    <!-- Party -->
    <div id="combatPCSection" style="display:none">
      <div class="combat-section-label party-label">Party</div>
      <div class="combat-grid" id="combatPCGrid"></div>

      <!-- Friendly NPCs (shown only when allies are present) -->
      <div id="combatAllySection" style="display:none">
        <div class="section-label" style="color:var(--easy); margin:12px 0 6px; font-size:10px; letter-spacing:1px">
          Friendly NPCs
        </div>
        <div class="combat-grid" id="combatAllyGrid"></div>
      </div>
    </div>

    <!-- Enemies -->
    <div class="combat-section-label" id="combatEnemyLabel" style="margin-top:0">Enemies</div>
    <div class="combat-grid" id="combatGrid"></div>
  </div>
</div>

<!-- Stat Block Lightbox -->
<div id="statLightbox" style="display:none" class="stat-lightbox" onclick="closeLightbox()">
  <img id="statLightboxImg" src="" alt="Stat block" onclick="event.stopPropagation()">
</div>

<!-- Add Combatant Mid-Fight Modal -->
<div class="modal-overlay" id="midCombatOverlay" onclick="if(event.target===this) closeMidCombatModal()">
  <div class="modal">
    <div class="modal-title">
      Add Combatant Mid-Fight
      <button class="modal-close" onclick="closeMidCombatModal()">×</button>
    </div>

    <!-- Filters (world is populated dynamically from adversary data; type/tier from config) -->
    <div class="filter-row" style="margin-bottom:8px">
      <select id="mcWorldFilter" onchange="renderMidCombatList()"></select>
      <select id="mcTypeFilter"  data-populate="types" data-blank="All Types" onchange="renderMidCombatList()"></select>
      <select id="mcTierFilter"  data-populate="tiers" data-blank="All Tiers" data-label-prefix="Tier " onchange="renderMidCombatList()"></select>
    </div>
    <input id="mcSearch" type="text" class="search-box" placeholder="Search adversaries…"
      oninput="renderMidCombatList()" style="width:100%; box-sizing:border-box; margin-bottom:8px">
    <div id="mcEnemyList" class="enemy-list" style="max-height:280px; overflow-y:auto; margin-bottom:0"></div>

    <!-- Selection details (shown after picking an adversary) -->
    <div id="mcSelected" style="display:none; margin-top:12px; border-top:1px solid var(--border); padding-top:12px">
      <div class="modal-grid">
        <div>
          <div class="field-label">Add As</div>
          <select id="mcIsAlly">
            <option value="0">Enemy</option>
            <option value="1">Ally</option>
          </select>
        </div>
        <div>
          <div class="field-label">Quantity</div>
          <input id="mcQty" type="number" min="1" max="20" value="1">
        </div>
        <div id="mcInvLabel" style="display:none">
          <div class="field-label">Investiture</div>
          <input id="mcInv" type="number" min="0" value="">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel"  onclick="closeMidCombatModal()">Cancel</button>
        <button class="btn-primary" onclick="confirmMidCombat()">Add to Combat</button>
      </div>
    </div>
  </div>
</div>
